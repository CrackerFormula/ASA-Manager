<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASA Manager - Login</title>
  <script src="/static/vendor/tailwind.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ark: {
              dark: '#0a0e14',
              panel: '#111827',
              surface: '#1e2532',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-ark-dark text-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm mx-4">
    <div class="card p-8" style="box-shadow: 0 0 40px rgba(34, 197, 94, 0.06);">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white tracking-tight">ASA Manager</h1>
        <p class="text-gray-500 text-sm mt-1">Enter password to continue</p>
      </div>

      <div id="error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-700/50 rounded-lg text-red-400 text-sm"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label for="password" class="block text-xs text-gray-400 mb-1.5">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autofocus
            class="w-full bg-gray-800/50 border border-gray-600/50 rounded-lg px-3 py-2.5 text-gray-100 placeholder-gray-600"
            placeholder="Enter web password"
          >
        </div>
        <button
          type="submit"
          id="loginBtn"
          class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2.5 px-4 rounded-lg transition-all shadow-sm"
        >
          Login
        </button>
      </form>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('loginBtn');
      const password = document.getElementById('password').value;

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (res.ok) {
          window.location.reload();
        } else if (res.status === 429) {
          errorEl.textContent = 'Too many attempts. Please wait a minute.';
          errorEl.classList.remove('hidden');
        } else {
          errorEl.textContent = 'Invalid password.';
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.textContent = 'Login';
    }
  </script>

</body>
</html>
