<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASA Manager</title>
  <script src="https://unpkg.com/tailwindcss@3.4.1/dist/tailwind.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            terminal: '#0d1117',
            surface: '#161b22',
            border: '#30363d',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data="appState()" x-init="init()">

  <!-- Toast notifications -->
  <div class="fixed top-4 right-4 z-50 flex flex-col gap-2" x-ref="toastContainer">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm font-medium transition-all duration-300"
           :class="toast.type === 'success' ? 'bg-green-800 border border-green-600 text-green-100' : 'bg-red-800 border border-red-600 text-red-100'">
        <span x-text="toast.type === 'success' ? '✓' : '✗'"></span>
        <span x-text="toast.message"></span>
      </div>
    </template>
  </div>

  <!-- Header bar -->
  <header class="bg-gray-900 border-b border-gray-700 px-4 py-3 flex items-center justify-between sticky top-0 z-40">
    <h1 class="text-xl font-bold text-white flex items-center gap-2">
      🦕 <span>ASA Manager</span>
    </h1>
    <div id="status-badge"
         hx-get="/api/server/status"
         hx-trigger="load, every 5s"
         hx-swap="outerHTML"
         hx-target="#status-badge">
      <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-gray-700 text-gray-300 border border-gray-600">
        <span class="w-2 h-2 rounded-full bg-gray-400"></span>
        LOADING
      </span>
    </div>
  </header>

  <!-- Control bar -->
  <div class="bg-gray-900 border-b border-gray-700 px-4 py-3">
    <div class="flex flex-wrap gap-2 items-center">
      <!-- Start -->
      <button
        class="btn-action bg-green-700 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"
        :disabled="busy"
        @click="serverAction('start')">
        <span x-show="!busy || activeAction !== 'start'">▶ Start</span>
        <span x-show="busy && activeAction === 'start'" class="flex items-center gap-1"><span class="spinner"></span> Starting…</span>
      </button>

      <!-- Stop -->
      <button
        class="btn-action bg-red-700 hover:bg-red-600 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"
        :disabled="busy"
        @click="serverAction('stop')">
        <span x-show="!busy || activeAction !== 'stop'">■ Stop</span>
        <span x-show="busy && activeAction === 'stop'" class="flex items-center gap-1"><span class="spinner"></span> Stopping…</span>
      </button>

      <!-- Restart -->
      <button
        class="btn-action bg-yellow-600 hover:bg-yellow-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"
        :disabled="busy"
        @click="serverAction('restart')">
        <span x-show="!busy || activeAction !== 'restart'">↺ Restart</span>
        <span x-show="busy && activeAction === 'restart'" class="flex items-center gap-1"><span class="spinner"></span> Restarting…</span>
      </button>

      <!-- Install/Update -->
      <button
        class="btn-action bg-blue-700 hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"
        :disabled="busy"
        @click="serverAction('install')">
        <span x-show="!busy || activeAction !== 'install'">⬇ Install / Update</span>
        <span x-show="busy && activeAction === 'install'" class="flex items-center gap-1"><span class="spinner"></span> Installing…</span>
      </button>

      <!-- Status info -->
      <div class="ml-auto text-xs text-gray-400 flex gap-4">
        <span x-show="serverStatus.uptime" x-text="'Uptime: ' + serverStatus.uptime"></span>
        <span x-show="serverStatus.player_count !== null && serverStatus.player_count !== undefined"
              x-text="'Players: ' + serverStatus.player_count"></span>
      </div>
    </div>
  </div>

  <!-- Main two-column layout -->
  <main class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4 max-w-screen-2xl mx-auto">

    <!-- LEFT: Settings Panel -->
    <section class="bg-gray-900 rounded-lg border border-gray-700 overflow-hidden" x-data="settingsPanel()">
      <div class="px-4 py-3 border-b border-gray-700 flex items-center gap-2">
        <span class="text-gray-300 font-semibold text-sm">⚙ Settings</span>
      </div>

      <!-- Section tabs -->
      <div class="flex flex-wrap gap-1 px-4 pt-3 border-b border-gray-700 pb-0">
        <template x-for="section in sections" :key="section">
          <button
            class="px-3 py-1.5 text-xs font-medium rounded-t-md border-b-2 transition-colors -mb-px"
            :class="activeSection === section
              ? 'border-green-500 text-green-400 bg-gray-800'
              : 'border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-500'"
            @click="activeSection = section">
            <span x-text="section"></span>
          </button>
        </template>
        <div x-show="sections.length === 0" class="text-xs text-gray-500 py-2">Loading…</div>
      </div>

      <!-- Settings form -->
      <div class="p-4 overflow-y-auto max-h-[calc(100vh-280px)]">
        <template x-if="activeSection && settingsData[activeSection]">
          <div>
            <form @submit.prevent="saveSection(activeSection)">
              <div class="space-y-3">
                <template x-for="[key, value] in Object.entries(settingsData[activeSection])" :key="key">
                  <div class="grid grid-cols-[1fr_1.5fr] gap-3 items-start">
                    <label class="text-xs text-gray-400 pt-2 break-all font-mono" x-text="key"></label>
                    <div class="relative">

                      <!-- Password field -->
                      <template x-if="key.toLowerCase().includes('password')">
                        <div class="flex gap-1">
                          <input
                            :type="showPassword[key] ? 'text' : 'password'"
                            :value="editedSettings[activeSection]?.[key] ?? value"
                            @input="updateSetting(activeSection, key, $event.target.value)"
                            class="flex-1 bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-xs text-gray-100 focus:outline-none focus:border-green-500 font-mono min-w-0">
                          <button type="button"
                            @click="showPassword[key] = !showPassword[key]"
                            class="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-gray-300 shrink-0">
                            <span x-text="showPassword[key] ? '🙈' : '👁'"></span>
                          </button>
                        </div>
                      </template>

                      <!-- Boolean checkbox -->
                      <template x-if="!key.toLowerCase().includes('password') && isBool(value)">
                        <label class="flex items-center gap-2 cursor-pointer pt-1">
                          <input type="checkbox"
                            :checked="parseBool(editedSettings[activeSection]?.[key] ?? value)"
                            @change="updateSetting(activeSection, key, $event.target.checked ? 'True' : 'False')"
                            class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-green-500 focus:ring-green-500 focus:ring-offset-gray-900">
                        </label>
                      </template>

                      <!-- Map name select -->
                      <template x-if="!key.toLowerCase().includes('password') && !isBool(value) && key === 'MAP_NAME'">
                        <select
                          :value="editedSettings[activeSection]?.[key] ?? value"
                          @change="updateSetting(activeSection, key, $event.target.value)"
                          class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-xs text-gray-100 focus:outline-none focus:border-green-500">
                          <template x-for="map in knownMaps" :key="map">
                            <option :value="map" :selected="(editedSettings[activeSection]?.[key] ?? value) === map" x-text="map"></option>
                          </template>
                        </select>
                      </template>

                      <!-- Number input -->
                      <template x-if="!key.toLowerCase().includes('password') && !isBool(value) && key !== 'MAP_NAME' && isNumber(key, value)">
                        <input type="number"
                          :value="editedSettings[activeSection]?.[key] ?? value"
                          @input="updateSetting(activeSection, key, $event.target.value)"
                          class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-xs text-gray-100 focus:outline-none focus:border-green-500 font-mono">
                      </template>

                      <!-- Default text input -->
                      <template x-if="!key.toLowerCase().includes('password') && !isBool(value) && key !== 'MAP_NAME' && !isNumber(key, value)">
                        <input type="text"
                          :value="editedSettings[activeSection]?.[key] ?? value"
                          @input="updateSetting(activeSection, key, $event.target.value)"
                          class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-xs text-gray-100 focus:outline-none focus:border-green-500 font-mono">
                      </template>

                    </div>
                  </div>
                </template>
              </div>

              <div class="mt-4 flex items-center gap-3">
                <button type="submit"
                  :disabled="savingSection"
                  class="bg-green-700 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded text-sm font-medium transition-colors flex items-center gap-2">
                  <span x-show="!savingSection">Save <span x-text="activeSection"></span></span>
                  <span x-show="savingSection" class="flex items-center gap-1"><span class="spinner"></span> Saving…</span>
                </button>
                <span x-show="saveMsg" x-text="saveMsg"
                  :class="saveMsgOk ? 'text-green-400' : 'text-red-400'"
                  class="text-xs transition-opacity"></span>
              </div>
            </form>
          </div>
        </template>
        <div x-show="sections.length === 0" class="text-xs text-gray-500">No settings loaded.</div>
      </div>
    </section>

    <!-- RIGHT: Log Viewer -->
    <section class="bg-gray-900 rounded-lg border border-gray-700 overflow-hidden flex flex-col" x-data="logViewer()">
      <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between shrink-0">
        <span class="text-gray-300 font-semibold text-sm">📋 Server Logs</span>
        <div class="flex items-center gap-3">
          <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer select-none">
            <input type="checkbox" x-model="autoScroll" class="w-3.5 h-3.5 rounded">
            Auto-scroll
          </label>
          <span class="text-xs text-gray-500" x-text="lines.length + ' lines'"></span>
          <button @click="clearLogs()"
            class="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-gray-300 transition-colors">
            Clear
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-3 font-mono text-xs log-panel bg-terminal"
           x-ref="logContainer"
           style="max-height: calc(100vh - 280px); min-height: 300px;">
        <template x-for="(line, i) in lines" :key="i">
          <div class="log-line leading-5 whitespace-pre-wrap break-all"
               :class="lineClass(line)"
               x-text="line"></div>
        </template>
        <div x-show="lines.length === 0" class="text-gray-600">Waiting for logs…</div>
      </div>
    </section>

  </main>

  <!-- HTMX status badge OOB target template (rendered server-side via HTMX swap) -->
  <!-- The /api/server/status returns JSON; we handle it in JS and also update the badge via HTMX -->

  <script>
    // ── Status badge: HTMX returns JSON, render badge via hx-on response
    // We override by intercepting the HTMX response to render badge HTML
    document.body.addEventListener('htmx:beforeSwap', function(evt) {
      if (evt.detail.target && evt.detail.target.id === 'status-badge') {
        try {
          const data = JSON.parse(evt.detail.serverResponse);
          const running = data.running;
          const badge = running
            ? `<span id="status-badge" hx-get="/api/server/status" hx-trigger="every 5s" hx-swap="outerHTML" hx-target="#status-badge" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-green-900 text-green-300 border border-green-700"><span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>RUNNING</span>`
            : `<span id="status-badge" hx-get="/api/server/status" hx-trigger="every 5s" hx-swap="outerHTML" hx-target="#status-badge" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-red-900 text-red-300 border border-red-700"><span class="w-2 h-2 rounded-full bg-red-500"></span>STOPPED</span>`;
          evt.detail.serverResponse = badge;

          // Also update Alpine appState
          if (window._alpineApp) {
            window._alpineApp.serverStatus = data;
          }
        } catch(e) {}
      }
    });

    // Re-initialize HTMX polling on new badge element
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.detail.target && evt.detail.target.id === 'status-badge') {
        htmx.process(document.getElementById('status-badge'));
      }
    });

    function appState() {
      return {
        busy: false,
        activeAction: null,
        toasts: [],
        serverStatus: {},

        init() {
          window._alpineApp = this;
        },

        async serverAction(action) {
          this.busy = true;
          this.activeAction = action;
          try {
            const res = await fetch(`/api/server/${action}`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) {
              this.showToast('error', data.detail || `${action} failed`);
            } else {
              this.showToast('success', data.message || `${action} succeeded`);
            }
          } catch(e) {
            this.showToast('error', `${action} error: ${e.message}`);
          } finally {
            this.busy = false;
            this.activeAction = null;
            // Trigger status refresh
            htmx.trigger(document.getElementById('status-badge'), 'load');
          }
        },

        showToast(type, message) {
          const id = Date.now();
          this.toasts.push({ id, type, message });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 4000);
        }
      };
    }

    function settingsPanel() {
      return {
        sections: [],
        settingsData: {},
        editedSettings: {},
        activeSection: null,
        savingSection: false,
        saveMsg: '',
        saveMsgOk: true,
        showPassword: {},

        knownMaps: [
          'TheIsland_WP',
          'TheIsland',
          'ScorchedEarth_WP',
          'ScorchedEarth_P',
          'Aberration_WP',
          'Aberration_P',
          'Extinction',
          'Genesis',
          'Genesis2',
          'CrystalIsles',
          'Ragnarok',
          'Valguero_P',
          'LostIsland',
          'Fjordur',
        ],

        async init() {
          try {
            const res = await fetch('/api/settings');
            if (!res.ok) return;
            const data = await res.json();
            this.settingsData = data;
            this.sections = Object.keys(data);
            if (this.sections.length > 0) {
              this.activeSection = this.sections[0];
            }
            // Deep copy for editing
            for (const s of this.sections) {
              this.editedSettings[s] = { ...data[s] };
            }
          } catch(e) {
            console.error('Failed to load settings', e);
          }
        },

        updateSetting(section, key, val) {
          if (!this.editedSettings[section]) this.editedSettings[section] = {};
          this.editedSettings[section][key] = val;
        },

        async saveSection(section) {
          this.savingSection = true;
          this.saveMsg = '';
          try {
            const res = await fetch('/api/settings', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ section, data: this.editedSettings[section] || this.settingsData[section] })
            });
            const data = await res.json();
            if (res.ok) {
              this.saveMsg = '✓ Saved';
              this.saveMsgOk = true;
              // Sync back
              this.settingsData[section] = { ...this.editedSettings[section] };
            } else {
              this.saveMsg = '✗ ' + (data.detail || 'Save failed');
              this.saveMsgOk = false;
            }
          } catch(e) {
            this.saveMsg = '✗ ' + e.message;
            this.saveMsgOk = false;
          } finally {
            this.savingSection = false;
            setTimeout(() => { this.saveMsg = ''; }, 3000);
          }
        },

        isBool(val) {
          if (typeof val === 'boolean') return true;
          if (typeof val === 'string') return val === 'True' || val === 'False' || val === 'true' || val === 'false';
          return false;
        },

        parseBool(val) {
          if (typeof val === 'boolean') return val;
          return val === 'True' || val === 'true';
        },

        isNumber(key, val) {
          const numKeys = ['MaxPlayers', 'Port', 'QueryPort', 'RCONPort', 'MaxStructuresInRange',
                           'ServerPort', 'UDPPort', 'Slots', 'MaxTributes'];
          if (numKeys.some(k => key.includes(k))) return true;
          if (typeof val === 'number') return true;
          if (typeof val === 'string' && /^\d+$/.test(String(val))) return true;
          return false;
        }
      };
    }

    function logViewer() {
      return {
        lines: [],
        autoScroll: true,
        MAX_LINES: 500,
        es: null,

        async init() {
          // Load recent logs
          try {
            const res = await fetch('/api/logs/recent?n=100');
            if (res.ok) {
              const data = await res.json();
              this.lines = data;
              this.$nextTick(() => this.scrollBottom());
            }
          } catch(e) {
            console.error('Failed to load recent logs', e);
          }

          // SSE stream
          this.startStream();
        },

        startStream() {
          if (this.es) { this.es.close(); }
          this._reconnecting = false;
          this.es = new EventSource('/api/logs/stream');
          this.es.onmessage = (evt) => {
            this.addLine(evt.data);
          };
          this.es.onerror = () => {
            if (this._reconnecting) return;
            this._reconnecting = true;
            this.es.close();
            setTimeout(() => this.startStream(), 3000);
          };
        },

        addLine(line) {
          this.lines.push(line);
          if (this.lines.length > this.MAX_LINES) {
            this.lines = this.lines.slice(this.lines.length - this.MAX_LINES);
          }
          if (this.autoScroll) {
            this.$nextTick(() => this.scrollBottom());
          }
        },

        clearLogs() {
          this.lines = [];
        },

        scrollBottom() {
          const el = this.$refs.logContainer;
          if (el) el.scrollTop = el.scrollHeight;
        },

        lineClass(line) {
          const l = line.toLowerCase();
          if (l.includes('error')) return 'text-red-400';
          if (l.includes('warning') || l.includes('warn')) return 'text-yellow-400';
          if (l.includes('server started') || l.includes('successfully')) return 'text-green-400';
          return 'text-gray-300';
        }
      };
    }
  </script>
</body>
</html>
